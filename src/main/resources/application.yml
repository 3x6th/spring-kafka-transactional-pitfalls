spring:
  datasource:
    url: jdbc:h2:mem:kafkalab;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.perevalov.kafkapitfals.domain
        spring.json.value.default.type: dev.perevalov.kafkapitfals.domain.TransferEvent
        spring.json.use.type.headers: false
        isolation.level: read_committed
    listener:
      ack-mode: record

app:
  kafka:
    transfer-topic: transfers.events

management:
  endpoints:
    web:
      exposure:
        include: health,info
